name: Update Data & Deploy

on:
  schedule:
    # Run every day at 07:00 UTC (04:00 GMT-3)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual runs

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py
        timeout-minutes: 120

      - name: Generate site data
        run: python generate_site.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json docs/data/ docs/fotos/
          git diff --cached --quiet || git commit -m "🔄 Update voting data $(date -u +%Y-%m-%d)"
          git push
